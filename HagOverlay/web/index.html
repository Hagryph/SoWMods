<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HagUI</title>
<style>
  :root{
    --bg0:#0A0A0C; --bg1:#121013; --panel:#1A1712; --panel2:#231E16; --warm:#241D0F;
    --accent:#E0B34A; --accent-dim:#B8862F; --text:#ECE6DA; --text-dim:#9C9486; --text-faint:#6B6456;
    --serif: "Constantia","Georgia","Times New Roman",serif;
    --sans: "Segoe UI",system-ui,sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; width:100%; overflow:hidden; }
  body{
    font-family:var(--sans);
    background:
      radial-gradient(115% 85% at 86% 6%, rgba(36,29,15,.60) 0%, rgba(36,29,15,0) 55%),
      linear-gradient(180deg,var(--bg1) 0%, var(--bg0) 100%);
    color:var(--text);
    display:flex; align-items:center; justify-content:center;
    user-select:none; cursor:default;
    animation:fade .18s ease-out;
  }
  @keyframes fade{ from{opacity:0} to{opacity:1} }

  /* Match the Skyrim card proportions: ~64% x ~64% of the stage. */
  .card{
    position:relative;
    width:64vw; height:64vh; max-width:1600px; max-height:920px;
    background:rgba(26,23,18,.97);
    border:1px solid rgba(224,179,74,.42);
    border-radius:1.1vh;
    box-shadow:0 3px 22px rgba(0,0,0,.55), 0 12px 60px rgba(0,0,0,.45);
    padding:4.2vh 4.6vw 0;
    overflow:hidden;
    display:flex; flex-direction:column;
    animation:rise .22s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes rise{ from{transform:translateY(1.2vh) scale(.99); opacity:0} to{transform:none; opacity:1} }
  /* left accent rail: bright bar + soft glow */
  .card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:.45vw;
                 background:linear-gradient(180deg,var(--accent),var(--accent-dim)); }
  .card::after{ content:""; position:absolute; left:.45vw; top:0; bottom:0; width:2.2vw;
                background:linear-gradient(90deg,rgba(224,179,74,.20),rgba(224,179,74,0)); pointer-events:none; }

  /* corner markers: HORIZONTAL gold lines only (like the Skyrim mod). Card-relative % so they
     stay put when the card hits its max-width/height cap. Skyrim: 30px inset, 26px long, 22px
     from the edge on an 820x462 card -> 3.66% / 3.17% / 4.76%. */
  .mark{ position:absolute; height:2px; width:3.17%; background:rgba(224,179,74,.30); }
  .mark.tl{ left:3.66%; top:4.76%; }
  .mark.br{ right:3.66%; bottom:4.76%; }

  /* tabs = cells (Skyrim: bold 15px, no letter-spacing, 16px side-pad + 12px gap, underline spans
     the whole cell). 15px/720=2.08vh, 16px/1280=1.25vw, 12px/1280=.94vw. */
  .tabs{ display:flex; gap:.94vw; align-items:flex-end;
         border-bottom:1px solid rgba(224,179,74,.16); flex:0 0 auto; }
  .tab{ font-family:var(--sans); font-weight:700; font-size:2.08vh; color:var(--text-dim);
        cursor:pointer; padding:.2vh 1.25vw 1.0vh; margin-bottom:-1px;
        border-bottom:2px solid transparent; transition:color .12s ease; }
  .tab:hover{ color:var(--text); }
  .tab.active{ color:var(--accent); border-bottom-color:var(--accent); }

  .content{ flex:1 1 auto; padding-top:4.4vh; }
  .kicker{ font-family:var(--serif); font-size:1.85vh; letter-spacing:.5em; color:var(--text-faint); }
  .wordmark{ font-family:var(--serif); font-weight:700; font-size:9vh; line-height:1.02; margin-top:1.4vh; }
  .wordmark .g{ color:var(--text); } .wordmark .u{ color:var(--accent); }
  .divider{ width:19vw; max-width:320px; height:2px; margin:2.4vh 0 2.2vh;
            background:linear-gradient(90deg,rgba(224,179,74,.6),rgba(224,179,74,0)); }
  .tagline{ font-family:var(--serif); font-size:2.5vh; color:var(--text-dim); max-width:52vw; line-height:1.5; }

  .actions{ flex:0 0 auto; display:flex; align-items:center; gap:1.6vw; padding:2vh 0 4.4vh; }
  .btn{ font-family:var(--serif); font-weight:700; font-size:2.1vh; letter-spacing:.14em;
        color:var(--accent); background:var(--panel2); border:1px solid rgba(224,179,74,.55);
        border-radius:.7vh; padding:1.5vh 3vw; cursor:pointer; transition:all .12s ease; }
  .btn:hover{ color:var(--text); background:#3a2f18; border-color:var(--accent); }
  .hint{ font-family:var(--serif); font-size:1.85vh; color:var(--text-faint); }

  /* EST footer: right edge aligned with the corner marks (3.66%), sitting just ABOVE the BR mark
     (mark at 4.76% from bottom, footer at ~6%) — the Skyrim relationship. */
  .footer{ position:absolute; right:3.66%; bottom:6%; text-align:right; font-family:var(--serif);
           font-size:1.53vh; letter-spacing:.18em; color:var(--text-faint); }
</style>
</head>
<body>
  <div class="card">
    <span class="mark tl"></span>
    <span class="mark br"></span>
    <div class="tabs">
      <div class="tab active">WELCOME</div>
      <div class="tab">GENERAL</div>
    </div>
    <div class="content">
      <div class="kicker">W E L C O M E&nbsp;&nbsp;T O</div>
      <div class="wordmark"><span class="g">Hag</span><span class="u">UI</span></div>
      <div class="divider"></div>
      <div class="tagline">Your private control room for every Hagryph mod &mdash; configuration,
        tools, and more, gathered in one place.</div>
    </div>
    <div class="actions">
      <button class="btn" id="close">CLOSE</button>
      <span class="hint">or press ESC</span>
    </div>
    <div class="footer">HAGRYPH &middot; EST. MMXXVI</div>
  </div>

<script>
  function closeHub(){ try{ window.chrome.webview.postMessage('close'); }catch(e){} }
  document.getElementById('close').addEventListener('click', closeHub);
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeHub(); });
  document.querySelectorAll('.tab').forEach(t =>
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
    }));
</script>
</body>
</html>
